name: Deploy VolcanREG to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Configure GitHub Pages base path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}/"
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}\" />|g" wwwroot/index.html
          sed -i "s|const base = \"/\";|const base = \"${BASE_PATH}\";|g" wwwroot/service-worker.published.js

      - name: Publish
        run: dotnet publish -c Release -o release

      - name: Prepare static artifact
        shell: bash
        run: |
          touch release/wwwroot/.nojekyll
          cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
